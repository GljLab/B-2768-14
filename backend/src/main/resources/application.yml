app:
  timezone: Asia/Shanghai

spring:
  application:
    name: employee-management
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/employee_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

file:
  upload:
    path: ./uploads
    max-size: 20971520

server:
  port: 8268

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: 员工管理系统API
    description: 员工管理系统后端接口文档
    version: 1.0.0

jwt:
  secret: employee-management-jwt-secret-key-change-this-in-production-2768
  expiration: 604800000  # 7天(毫秒)
